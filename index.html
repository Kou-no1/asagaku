<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

/* =========================================================================
   問題プール（オリジナル・著作権フリー / 漢字は学習指導要領 配当漢字に準拠）
   各問題は unit タグを持つ → 将来の「分散学習（3日後/1週/3週 再出題）」に対応
   ========================================================================= */

// --- 漢字（読み）：学年別配当漢字から ---
const KANJI = [
  // 1年
  { id:"k1-1", mode:"kanji", grade:1, unit:"k1-数", type:"read", q:"{三}つ", a:"みっ", choices:["みっ","さん","ご","む"] },
  { id:"k1-2", mode:"kanji", grade:1, unit:"k1-自然", type:"read", q:"{山}にのぼる", a:"やま", choices:["やま","かわ","うみ","もり"] },
  { id:"k1-3", mode:"kanji", grade:1, unit:"k1-自然", type:"read", q:"大きな{木}", a:"き", choices:["き","は","ね","み"] },
  // 2年
  { id:"k2-1", mode:"kanji", grade:2, unit:"k2-自然", type:"read", q:"{晴}れた空", a:"は", choices:["は","あめ","くも","ゆき"] },
  { id:"k2-2", mode:"kanji", grade:2, unit:"k2-生活", type:"read", q:"{朝}ごはん", a:"あさ", choices:["あさ","ひる","よる","ばん"] },
  { id:"k2-3", mode:"kanji", grade:2, unit:"k2-動き", type:"read", q:"本を{読}む", a:"よ", choices:["よ","か","み","き"] },
  // 3年
  { id:"k3-1", mode:"kanji", grade:3, unit:"k3-動き", type:"read", q:"曲が{る}", a:"まが", choices:["まが","ま","きょく","の"] },
  { id:"k3-2", mode:"kanji", grade:3, unit:"k3-学校", type:"read", q:"{宿}題をする", a:"しゅく", choices:["しゅく","がく","か","と"] },
  { id:"k3-3", mode:"kanji", grade:3, unit:"k3-自然", type:"read", q:"暑い{夏}", a:"なつ", choices:["なつ","はる","あき","ふゆ"] },
  // 4年
  { id:"k4-1", mode:"kanji", grade:4, unit:"k4-社会", type:"read", q:"{改}める", a:"あらた", choices:["あらた","かい","おさ","ふか"] },
  { id:"k4-2", mode:"kanji", grade:4, unit:"k4-自然", type:"read", q:"{季}節の変化", a:"き", choices:["き","せつ","じ","か"] },
  // 5年
  { id:"k5-1", mode:"kanji", grade:5, unit:"k5-社会", type:"read", q:"{貿}易を学ぶ", a:"ぼう", choices:["ぼう","えき","か","こう"] },
  { id:"k5-2", mode:"kanji", grade:5, unit:"k5-生活", type:"read", q:"{快}い風", a:"こころよ", choices:["こころよ","かい","はや","つよ"] },
  // 6年
  { id:"k6-1", mode:"kanji", grade:6, unit:"k6-社会", type:"read", q:"{憲}法を学ぶ", a:"けん", choices:["けん","ほう","のり","りつ"] },
  { id:"k6-2", mode:"kanji", grade:6, unit:"k6-生活", type:"read", q:"{誠}実な人", a:"せい", choices:["せい","じつ","まこと","しん"] },
];

/* =========================================================================
   計算：単元タグ付きの生成器（add/sub/mul/div/decimal/fraction）
   日付シードから決定的に1問を作る → 全員同じ日は同じ問題（Wordle型）
   ========================================================================= */
const CALC_GEN = {
  "c1-たし算":  { grade:1, label:"たし算", gen:(r)=>{const a=1+r(9),b=1+r(9);return {q:`${a} + ${b}`,a:a+b};} },
  "c1-ひき算":  { grade:1, label:"ひき算", gen:(r)=>{const a=2+r(8),b=1+r(a-1);return {q:`${a} - ${b}`,a:a-b};} },
  "c2-たし算":  { grade:2, label:"たし算(2桁)", gen:(r)=>{const a=10+r(80),b=10+r(80);return {q:`${a} + ${b}`,a:a+b};} },
  "c2-かけ算":  { grade:2, label:"九九", gen:(r)=>{const a=1+r(9),b=1+r(9);return {q:`${a} × ${b}`,a:a*b};} },
  "c3-わり算":  { grade:3, label:"わり算", gen:(r)=>{const b=2+r(8),ans=1+r(9);return {q:`${b*ans} ÷ ${b}`,a:ans};} },
  "c4-小数":    { grade:4, label:"小数のたし算", gen:(r)=>{const a=(1+r(40))/10,b=(1+r(40))/10;return {q:`${a.toFixed(1)} + ${b.toFixed(1)}`,a:Math.round((a+b)*10)/10};} },
  "c5-小数かけ":{ grade:5, label:"小数のかけ算", gen:(r)=>{const a=(1+r(20))/10,b=1+r(8);return {q:`${a.toFixed(1)} × ${b}`,a:Math.round(a*b*10)/10};} },
  "c6-分数":    { grade:6, label:"分数のたし算", gen:(r)=>{const d=2+r(6),n1=1+r(d-1),n2=1+r(d-1);return {q:`${n1}/${d} + ${n2}/${d}`,a:`${n1+n2}/${d}`};} },
};

// 日付シード（YYYY-MM-DD → 数値）。同じ日は同じシード。
function dateSeed(dateStr){ let h=0; for(const c of dateStr) h=(h*31+c.charCodeAt(0))>>>0; return h; }
function makeRand(seed){ let s=seed||1; return (n)=>{ s=(s*1103515245+12345)&0x7fffffff; return s%n; }; }
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }

/* プールから「今日の問題」を決定的に取り出す */
function pickToday(pool, date){
  const seed = dateSeed(date);
  const rand = makeRand(seed);
  if(pool.mode==="kanji"){
    const items = KANJI.filter(k=> pool.units.includes(k.unit));
    if(items.length===0) return null;
    return items[seed % items.length];
  } else {
    const keys = pool.units.filter(u=>CALC_GEN[u]);
    if(keys.length===0) return null;
    const key = keys[seed % keys.length];
    const made = CALC_GEN[key].gen(rand);
    return { id:`${key}-${date}`, mode:"calc", unit:key, q:made.q, a:String(made.a), choices:null };
  }
}

// 紙吹雪
function Confetti(){
  const colors=["#ff8a5c","#ffd24c","#4ec27a","#57b6ff","#ff7eb6","#b78cff"];
  const pieces=useMemo(()=>Array.from({length:50},(_,i)=>({
    left: Math.random()*100, delay: Math.random()*0.4, dur: 1.2+Math.random()*1,
    color: colors[i%colors.length], size: 8+Math.random()*8
  })),[]);
  return pieces.map((p,i)=>(
    <div key={i} className="confetti" style={{
      left:`${p.left}%`, background:p.color, width:p.size, height:p.size,
      borderRadius: i%2?"50%":"2px",
      animation:`fall ${p.dur}s ${p.delay}s ease-in forwards`
    }}/>
  ));
}

/* ---- 子どもモード：今日の一問 ---- */
function KidQuiz({ pool, student, onRecord }){
  const date = todayStr();
  const q = useMemo(()=>pickToday(pool, date),[pool, date]);
  const [input, setInput] = useState("");
  const [picked, setPicked] = useState(null);
  const [done, setDone] = useState(false);
  const [correct, setCorrect] = useState(false);

  if(!q) return <div className="card">この プールには もんだいが ありません。先生に つたえてね。</div>;

  const finish=(isRight)=>{
    setCorrect(isRight); setDone(true);
    onRecord({ date, studentId:student, questionId:q.id, unit:q.unit, mode:q.mode, correct:isRight });
  };
  const submitInput=()=> finish(input.trim()===q.a);
  const submitChoice=(c)=>{ setPicked(c); setTimeout(()=>finish(c===q.a),500); };

  const display = q.q.replace(/\{(.+?)\}/g, "（$1）");

  return (
    <div className="card pop">
      {done && correct && <Confetti/>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <span className="pill">{q.mode==="kanji"?"📖 かんじ":"🔢 けいさん"}</span>
        <span style={{fontSize:13,color:"#aa9"}}>{date}</span>
      </div>

      {!done ? (
        <>
          <div style={{fontSize:38,fontWeight:800,textAlign:"center",margin:"28px 0",color:"#5a4a42"}}>
            {display}{q.mode==="calc" && " = ?"}
          </div>
          {q.choices ? (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {q.choices.map(c=>(
                <button key={c} className={`btn-choice ${picked===c?(c===q.a?"correct":"wrong"):""}`}
                  disabled={picked!==null} onClick={()=>submitChoice(c)}>{c}</button>
              ))}
            </div>
          ) : (
            <>
              <input className="answer-in" inputMode={q.mode==="calc"?"decimal":"text"}
                value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&submitInput()} placeholder="こたえ" autoFocus/>
              <div style={{height:14}}/>
              <button className="btn-main" onClick={submitInput}>こたえる！</button>
            </>
          )}
        </>
      ) : (
        <div style={{textAlign:"center"}} className="pop">
          <div style={{fontSize:72,margin:"10px 0"}}>{correct?"🟩":"🟨"}</div>
          <div style={{fontSize:26,fontWeight:800,color:correct?"#3ba85f":"#cc8a2c"}}>
            {correct?"せいかい！すごい！":"おしい！またあした"}
          </div>
          {!correct && <div style={{marginTop:10,fontSize:18,color:"#888"}}>こたえ：<b>{q.a}</b></div>}
        </div>
      )}
    </div>
  );
}

/* ---- ストリーク（炎）表示 ---- */
function Streak({ records, student }){
  const days = useMemo(()=>{
    const mine = new Set(records.filter(r=>r.studentId===student).map(r=>r.date));
    let count=0; const d=new Date();
    while(true){
      const s=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      if(mine.has(s)){ count++; d.setDate(d.getDate()-1); } else break;
    }
    return count;
  },[records, student]);
  return (
    <div className="card" style={{marginTop:14,textAlign:"center",padding:16}}>
      <span style={{fontSize:22,fontWeight:800,color:"#ff7a3c"}}>
        🔥 {days}日 れんぞく！
      </span>
    </div>
  );
}

/* ---- 先生：プール設定 ---- */
function PoolSetup({ pool, setPool }){
  const allKanjiUnits = [...new Set(KANJI.map(k=>k.unit))];
  const allCalcUnits = Object.keys(CALC_GEN);
  const units = pool.mode==="kanji"?allKanjiUnits:allCalcUnits;
  const grades = pool.mode==="kanji"
    ? Object.fromEntries(KANJI.map(k=>[k.unit,k.grade]))
    : Object.fromEntries(Object.entries(CALC_GEN).map(([k,v])=>[k,v.grade]));

  const toggle=(u)=> setPool(p=>({...p, units: p.units.includes(u)? p.units.filter(x=>x!==u):[...p.units,u]}));

  return (
    <div className="card">
      <h3 style={{marginBottom:14}}>出題プールの設定</h3>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <button className={`tab ${pool.mode==="kanji"?"active":""}`} onClick={()=>setPool(p=>({...p,mode:"kanji",units:[]}))}>📖 漢字</button>
        <button className={`tab ${pool.mode==="calc"?"active":""}`} onClick={()=>setPool(p=>({...p,mode:"calc",units:[]}))}>🔢 計算</button>
      </div>
      <p style={{fontSize:13,color:"#999",marginBottom:10}}>学年×単元を選択（年度初めは前学年も選べます）</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {units.map(u=>(
          <button key={u} onClick={()=>toggle(u)}
            style={{padding:"10px",borderRadius:12,fontWeight:700,fontSize:13,textAlign:"left",
              background: pool.units.includes(u)?"#ff8a5c":"#fff0e0",
              color: pool.units.includes(u)?"#fff":"#cc6a2c"}}>
            <span style={{opacity:.7,fontSize:11}}>{grades[u]}年</span><br/>
            {pool.mode==="calc"?CALC_GEN[u].label:u.replace(/^k\d-/,"")}
          </button>
        ))}
      </div>
      <p style={{marginTop:14,fontSize:13,color:"#aa9"}}>選択中: {pool.units.length}単元</p>
    </div>
  );
}

/* ---- 先生：ダッシュボード ---- */
function Dashboard({ records, students }){
  const date = todayStr();
  const today = records.filter(r=>r.date===date);
  const rate = today.length? Math.round(today.filter(r=>r.correct).length/today.length*100):0;

  // つまずき：不正解の多い問題/単元
  const byUnit = {};
  records.forEach(r=>{ byUnit[r.unit]=byUnit[r.unit]||{n:0,wrong:0}; byUnit[r.unit].n++; if(!r.correct)byUnit[r.unit].wrong++; });
  const stumble = Object.entries(byUnit).map(([u,v])=>({u,...v,err:Math.round(v.wrong/v.n*100)}))
    .sort((a,b)=>b.err-a.err);

  const heatColor=(ok)=> ok===null?"#ddd": ok?"#4ec27a":"#e85a5a";

  return (
    <div>
      <div className="card" style={{marginBottom:14,display:"flex",justifyContent:"space-around",textAlign:"center"}}>
        <div><div style={{fontSize:32,fontWeight:800,color:"#ff7a3c"}}>{today.length}</div><div style={{fontSize:12,color:"#999"}}>今日の取組</div></div>
        <div><div style={{fontSize:32,fontWeight:800,color:"#4ec27a"}}>{rate}%</div><div style={{fontSize:12,color:"#999"}}>正答率</div></div>
        <div><div style={{fontSize:32,fontWeight:800,color:"#57b6ff"}}>{students.length}</div><div style={{fontSize:12,color:"#999"}}>在籍</div></div>
      </div>

      <div className="card" style={{marginBottom:14}}>
        <h3 style={{marginBottom:12}}>今日の取り組み状況</h3>
        <table>
          <thead><tr><th>なまえ</th><th>取組</th><th>正誤</th></tr></thead>
          <tbody>
            {students.map(s=>{
              const r=today.find(x=>x.studentId===s);
              return <tr key={s}><td>{s}</td><td>{r?"✅":"—"}</td>
                <td>{r?<span className="heat" style={{background:heatColor(r.correct)}}>{r.correct?"○":"×"}</span>:""}</td></tr>;
            })}
          </tbody>
        </table>
      </div>

      <div className="card">
        <h3 style={{marginBottom:12}}>つまずきやすい単元</h3>
        {stumble.length===0? <p style={{color:"#aaa"}}>まだデータがありません</p> :
          stumble.slice(0,6).map(s=>(
            <div key={s.u} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #f0e8e0"}}>
              <span style={{fontWeight:700}}>{CALC_GEN[s.u]?CALC_GEN[s.u].label:s.u.replace(/^k\d-/,"")}</span>
              <span><span className="heat" style={{background:`hsl(${120-s.err*1.2},70%,55%)`,width:44}}>{s.err}%</span>
                <span style={{fontSize:12,color:"#999",marginLeft:8}}>誤答率</span></span>
            </div>
          ))}
      </div>
    </div>
  );
}

/* ---- ルート ---- */
function App(){
  const STUDENTS = ["あおい","はると","ゆい","そうた","めい","りく"];
  const [view, setView] = useState("home"); // home | kid | teacher
  const [student, setStudent] = useState(STUDENTS[0]);
  const [tab, setTab] = useState("pool"); // pool | dash
  const [records, setRecords] = useState([]); // 本番は loadStore().records
  const [pool, setPool] = useState({ mode:"calc", units:["c2-かけ算","c3-わり算"] });

  const record=(rec)=>{
    setRecords(prev=>{
      if(prev.find(r=>r.date===rec.date && r.studentId===rec.studentId)) return prev;
      const next=[...prev, rec];
      // ▼本番: const data=loadStore(); data.records=next; saveStore(data); syncToSheet(rec);
      return next;
    });
  };

  if(view==="home") return (
    <div style={{textAlign:"center",paddingTop:40}}>
      <div style={{fontSize:48}}>🌅</div>
      <h1 style={{fontSize:32,fontWeight:800,color:"#ff7a3c",margin:"8px 0 4px"}}>今日の一問</h1>
      <p style={{color:"#999",marginBottom:30}}>朝学習アプリ</p>
      <div className="card">
        <p style={{fontWeight:700,marginBottom:10,color:"#cc6a2c"}}>だれが やりますか？</p>
        <select value={student} onChange={e=>setStudent(e.target.value)} style={{width:"100%",marginBottom:16}}>
          {STUDENTS.map(s=><option key={s}>{s}</option>)}
        </select>
        <button className="btn-main" onClick={()=>setView("kid")}>はじめる！</button>
        <div style={{height:12}}/>
        <button onClick={()=>setView("teacher")} style={{background:"#fff0e0",color:"#cc6a2c",fontWeight:700,fontSize:15,borderRadius:16,padding:12,width:"100%"}}>👩‍🏫 先生モード</button>
      </div>
    </div>
  );

  if(view==="kid") return (
    <div>
      <button onClick={()=>setView("home")} style={{background:"none",color:"#cc6a2c",fontWeight:700,marginBottom:10}}>← もどる</button>
      <KidQuiz pool={pool} student={student} onRecord={record}/>
      <Streak records={records} student={student}/>
    </div>
  );

  return (
    <div>
      <button onClick={()=>setView("home")} style={{background:"none",color:"#cc6a2c",fontWeight:700,marginBottom:10}}>← もどる</button>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <button className={`tab ${tab==="pool"?"active":""}`} onClick={()=>setTab("pool")}>プール設定</button>
        <button className={`tab ${tab==="dash"?"active":""}`} onClick={()=>setTab("dash")}>ダッシュボード</button>
      </div>
      {tab==="pool"? <PoolSetup pool={pool} setPool={setPool}/> : <Dashboard records={records} students={STUDENTS}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
