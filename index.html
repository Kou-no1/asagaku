<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

/* =========================================================================

   各問題は unit タグを持つ → 将来の「分散学習（3日後/1週/3週 再出題）」に対応

// --- 漢字（読み）：学年別配当漢字から ---
const KANJI = [

  { id:"k1-1", mode:"kanji", grade:1, unit:"k1-数", type:"read", q:"{三}つ", a:"みっ", choices:["みっ","さん","ご","む"] },

  { id:"k2-3", mode:"kanji", grade:2, unit:"k2-動き", type:"read", q:"本を{読}む", a:"よ", choices:["よ","か","み","き"] },
  // 3年
  { id:"k3-1", mode:"kanji", grade:3, unit:"k3-動き", type:"read", q:"曲が{る}", a:"まが", choices:["まが","ま","きょく","の"] },
  { id:"k3-2", mode:"kanji", grade:3, unit:"k3-学校", type:"read", q:"{宿}題をする", a:"しゅく", choices:["しゅく","がく","か","と"] },
  { id:"k3-3", mode:"kanji", grade:3, unit:"k3-自然", type:"read", q:"暑い{夏}", a:"なつ", choices:["なつ","はる","あき","ふゆ"] },
  // 4年
  { id:"k4-1", mode:"kanji", grade:4, unit:"k4-社会", type:"read", q:"{改}める", a:"あらた", choices:["あらた","かい","おさ","ふか"] },
  { id:"k4-2", mode:"kanji", grade:4, unit:"k4-自然", type:"read", q:"{季}節の変化", a:"き", choices:["き","せつ","じ","か"] },
  // 5年
  { id:"k5-1", mode:"kanji", grade:5, unit:"k5-社会", type:"read", q:"{貿}易を学ぶ", a:"ぼう", choices:["ぼう","えき","か","こう"] },
  { id:"k5-2", mode:"kanji", grade:5, unit:"k5-生活", type:"read", q:"{快}い風", a:"こころよ", choices:["こころよ","かい","はや","つよ"] },
  // 6年
  { id:"k6-1", mode:"kanji", grade:6, unit:"k6-社会", type:"read", q:"{憲}法を学ぶ", a:"けん", choices:["けん","ほう","のり","りつ"] },
  { id:"k6-2", mode:"kanji", grade:6, unit:"k6-生活", type:"read", q:"{誠}実な人", a:"せい", choices:["せい","じつ","まこと","しん"] },
];

/* =========================================================================
   計算：単元タグ付きの生成器（add/sub/mul/div/decimal/fraction）
   日付シードから決定的に1問を作る → 全員同じ日は同じ問題（Wordle型）
   ========================================================================= */
// 分数ユーティリティ
function gcd(a,b){ return b===0?a:gcd(b,a%b); }
function fracReduce(n,d){ const g=gcd(Math.abs(n),Math.abs(d)); return [n/g,d/g]; }

/*
  分数の正誤判定（かけ算・わり算対応版）
  ルール：
    - 約分されていない入力は不正解（例: 2/4 は不正解、1/2 が正解）
    - 整数に約分できる場合は整数のみ正解（例: 4/4 → 1 のみ）
    - 仮分数・帯分数どちらでも正解（例: 7/4 と 1と3/4 は同値）
    - 入力形式:
        整数         : "3"
        仮分数       : "7/4"
        帯分数       : "1と3/4" または "1 3/4"
*/
function fracEqual(input, ansN, ansD){
  const s = input.trim();

  // 正答を既約分数に
  const [an, ad] = fracReduce(ansN, ansD);

  // 整数のみ正解のケース
  if(ad === 1) return s === String(an);

  // 帯分数パース: "Xと N/D" or "X N/D"
  const mixedM = s.match(/^(\d+)[とと\s]+(\d+)[\/／](\d+)$/);
  if(mixedM){
    const w=parseInt(mixedM[1]), fn=parseInt(mixedM[2]), fd=parseInt(mixedM[3]);
    if(fd===0) return false;
    // 帯分数 → 仮分数
    const iN = w*fd + fn;
    // 約分チェック（入力の分数部分が既約か）
    const [rn,rd] = fracReduce(fn, fd);
    if(rn!==fn || rd!==fd) return false; // 分数部分が約分されていない
    const [cn,cd] = fracReduce(iN, fd);
    return cn===an && cd===ad;
  }

  // 仮分数パース: "N/D"
  const fracM = s.match(/^(\d+)[\/／](\d+)$/);
  if(fracM){
    const fn=parseInt(fracM[1]), fd=parseInt(fracM[2]);
    if(fd===0) return false;
    // 約分チェック：入力が既約か
    const [rn,rd] = fracReduce(fn, fd);
    if(rn!==fn || rd!==fd) return false; // 約分されていない → 不正解
    return fn===an && fd===ad;
  }

  return false;
}

// 答えを帯分数文字列で返す（表示用）
function toMixed(n, d){
  const [rn,rd] = fracReduce(n,d);
  if(rd===1) return String(rn);
  if(rn < rd) return `${rn}/${rd}`;
  const w = Math.floor(rn/rd), rem = rn % rd;
  return rem===0 ? String(w) : `${w}と${rem}/${rd}`;
}

const CALC_GEN = {
  "c1-たし算":   { grade:1, label:"たし算",       gen:(r)=>{const a=1+r(9),b=1+r(9);return {q:`${a} + ${b}`,a:a+b,type:"int"};} },
  "c1-ひき算":   { grade:1, label:"ひき算",       gen:(r)=>{const a=2+r(8),b=1+r(a-1);return {q:`${a} - ${b}`,a:a-b,type:"int"};} },
  "c2-たし算":   { grade:2, label:"たし算(2桁)",  gen:(r)=>{const a=10+r(80),b=10+r(80);return {q:`${a} + ${b}`,a:a+b,type:"int"};} },
  "c2-かけ算":   { grade:2, label:"九九",         gen:(r)=>{const a=1+r(9),b=1+r(9);return {q:`${a} × ${b}`,a:a*b,type:"int"};} },
  "c3-わり算":   { grade:3, label:"わり算",       gen:(r)=>{const b=2+r(8),ans=1+r(9);return {q:`${b*ans} ÷ ${b}`,a:ans,type:"int"};} },
  "c4-小数":     { grade:4, label:"小数のたし算", gen:(r)=>{const a=(1+r(40))/10,b=(1+r(40))/10;return {q:`${a.toFixed(1)} + ${b.toFixed(1)}`,a:Math.round((a+b)*10)/10,type:"decimal"};} },
  "c5-小数かけ": { grade:5, label:"小数のかけ算", gen:(r)=>{const a=(1+r(20))/10,b=1+r(8);return {q:`${a.toFixed(1)} × ${b}`,a:Math.round(a*b*10)/10,type:"decimal"};} },
  "c6-分数たし": { grade:6, label:"分数のたし算", gen:(r)=>{
    const d=2+r(7);
    const n1=1+r(d-1), n2=1+r(d-1);
    const [rn,rd]=fracReduce(n1+n2,d);
    return {q:`FRAC:${n1}/${d}+${n2}/${d}`, a:toMixed(n1+n2,d), type:"frac", fracN:n1+n2, fracD:d};
  }},
  "c6-分数かけ": { grade:6, label:"分数のかけ算", gen:(r)=>{
    // 分子同士・分母同士がかぶらないよう小さめの値で生成
    const n1=1+r(5), d1=2+r(5), n2=1+r(5), d2=2+r(5);
    const rN=n1*n2, rD=d1*d2;
    return {q:`FRAC:${n1}/${d1}×${n2}/${d2}`, a:toMixed(rN,rD), type:"frac", fracN:rN, fracD:rD};
  }},
  "c6-分数わり": { grade:6, label:"分数のわり算", gen:(r)=>{
    // a/b ÷ c/d = a*d / b*c
    const n1=1+r(5), d1=2+r(5), n2=1+r(5), d2=2+r(5);
    const rN=n1*d2, rD=d1*n2;
    return {q:`FRAC:${n1}/${d1}÷${n2}/${d2}`, a:toMixed(rN,rD), type:"frac", fracN:rN, fracD:rD};
  }},
};

// 日付シード（YYYY-MM-DD → 数値）。同じ日は同じシード。
function dateSeed(dateStr){ let h=0; for(const c of dateStr) h=(h*31+c.charCodeAt(0))>>>0; return h; }
function makeRand(seed){ let s=seed||1; return (n)=>{ s=(s*1103515245+12345)&0x7fffffff; return s%n; }; }
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }

/* プールから「今日の2問」を決定的に取り出す（計算1＋漢字1） */
function pickToday(pool, date){
  const seed = dateSeed(date);
  const rand = makeRand(seed);

  // 計算問題
  let calc = null;
  const calcKeys = (pool.calcUnits||[]).filter(u=>CALC_GEN[u]);
  if(calcKeys.length>0){
    const key = calcKeys[seed % calcKeys.length];
    const made = CALC_GEN[key].gen(rand);
    calc = { id:`${key}-${date}`, mode:"calc", unit:key, q:made.q, a:String(made.a), choices:null };
  }

  // 漢字問題（seed+7 で別の問題にする）
  let kanji = null;
  const kanjiItems = KANJI.filter(k=>(pool.kanjiUnits||[]).includes(k.unit));
  if(kanjiItems.length>0){
    kanji = kanjiItems[(seed+7) % kanjiItems.length];
  }

  return { calc, kanji };
}

// 紙吹雪
function Confetti(){
  const colors=["#ff8a5c","#ffd24c","#4ec27a","#57b6ff","#ff7eb6","#b78cff"];
  const pieces=useMemo(()=>Array.from({length:50},(_,i)=>({
    left: Math.random()*100, delay: Math.random()*0.4, dur: 1.2+Math.random()*1,
    color: colors[i%colors.length], size: 8+Math.random()*8
  })),[]);
  return pieces.map((p,i)=>(
    <div key={i} className="confetti" style={{
      left:`${p.left}%`, background:p.color, width:p.size, height:p.size,
      borderRadius: i%2?"50%":"2px",
      animation:`fall ${p.dur}s ${p.delay}s ease-in forwards`
    }}/>
  ));
}

/* ---- 分数をCSSで縦積み表示 ---- */
function FracDisplay({ n, d, size=38 }){
  return (
    <span style={{display:"inline-flex",flexDirection:"column",alignItems:"center",
      verticalAlign:"middle",lineHeight:1.1,margin:"0 4px"}}>
      <span style={{fontSize:size*0.7,fontWeight:800,borderBottom:`3px solid #5a4a42`,
        paddingBottom:2,minWidth:size*0.9,textAlign:"center"}}>{n}</span>
      <span style={{fontSize:size*0.7,fontWeight:800,paddingTop:2,
        minWidth:size*0.9,textAlign:"center"}}>{d}</span>
    </span>
  );
}

/* 問題文をパースしてJSX化（分数たし・かけ・わり対応） */
function QuestionDisplay({ q }){
  if(q.type==="frac" && q.q.startsWith("FRAC:")){
    const body = q.q.slice(5); // 例: "2/3×3/4" or "1/2+3/4" or "2/3÷1/4"
    // 演算子を検出（半角 + × ÷ で統一）
    const opMatch = body.match(/^(\d+\/\d+)([+\u00D7\u00F7])(\d+\/\d+)$/);
    if(opMatch){
      const [,rawL, op, rawR] = opMatch;
      const [n1,d1] = rawL.split("/").map(Number);
      const [n2,d2] = rawR.split("/").map(Number);
      const opDisp = {"+":"＋","\u00D7":"×","\u00F7":"÷"}[op] || op;
      return (
        <div style={{fontSize:38,fontWeight:800,textAlign:"center",margin:"18px 0",color:"#5a4a42",
          display:"flex",alignItems:"center",justifyContent:"center",flexWrap:"wrap",gap:6}}>
          <FracDisplay n={n1} d={d1}/>
          <span>{opDisp}</span>
          <FracDisplay n={n2} d={d2}/>
          <span>＝ ?</span>
        </div>
      );
    }
  }
  // 通常の問題
  const display = q.q.replace(/\{(.+?)\}/g, "（$1）");
  return (
    <div style={{fontSize:36,fontWeight:800,textAlign:"center",margin:"18px 0",color:"#5a4a42"}}>
      {display}{q.mode==="calc" && q.type!=="frac" && " = ?"}
    </div>
  );
}

/* 正答表示（帯分数・仮分数・整数を状況に応じて表示） */
function AnswerDisplay({ q }){
  if(q.type==="frac"){
    const [rn,rd] = fracReduce(q.fracN, q.fracD);
    // 整数
    if(rd===1) return <span style={{fontSize:28,fontWeight:800}}>{rn}</span>;
    // 帯分数（仮分数のとき）
    if(rn > rd){
      const w=Math.floor(rn/rd), rem=rn%rd;
      return (
        <span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:26,fontWeight:800}}>
          {w}<span style={{fontSize:18,margin:"0 2px"}}>と</span><FracDisplay n={rem} d={rd} size={28}/>
          <span style={{fontSize:14,color:"#999",marginLeft:4}}>または</span>
          <FracDisplay n={rn} d={rd} size={28}/>
        </span>
      );
    }
    return <FracDisplay n={rn} d={rd} size={32}/>;
  }
  return <span style={{fontSize:22}}>{q.a}</span>;
}

/* ---- 1問コンポーネント（即答ボタン付き） ---- */
function OneQuestion({ q, onFinish, allDone }){
  const [input, setInput] = useState("");
  const [picked, setPicked] = useState(null);
  const [state, setState] = useState("idle");
  const [correct, setCorrect] = useState(false);

  if(!q) return null;

  // 正誤判定（分数は約分・整数化を考慮）
  const checkAnswer=(ans)=>{
    if(q.type==="frac"){
      return fracEqual(ans, q.fracN, q.fracD);
    }
    return ans.trim()===String(q.a);
  };

  const finish=(isRight, revealed=false)=>{
    setCorrect(isRight); setState(revealed?"revealed":"answered");
    onFinish({ questionId:q.id, unit:q.unit, mode:q.mode, correct:isRight });
  };
  const submitInput=()=>{ if(!input.trim()) return; finish(checkAnswer(input)); };
  const submitChoice=(c)=>{ if(state!=="idle") return; setPicked(c); setTimeout(()=>finish(c===q.a),400); };
  const reveal=()=>{ setState("revealed"); onFinish({ questionId:q.id, unit:q.unit, mode:q.mode, correct:false, skipped:true }); };

  const done = state!=="idle";
  const label = q.mode==="kanji"?"📖 かんじ":"🔢 けいさん";
  const isFrac = q.type==="frac";

  return (
    <div className="card" style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span className="pill">{label}</span>
        {done && <span style={{fontSize:24}}>{correct?"🟩":"🟨"}</span>}
      </div>
      <QuestionDisplay q={q}/>

      {!done ? (
        <>
          {q.choices ? (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {q.choices.map(c=>(
                <button key={c} className={`btn-choice ${picked===c?(c===q.a?"correct":"wrong"):""}`}
                  disabled={picked!==null} onClick={()=>submitChoice(c)}>{c}</button>
              ))}
            </div>
          ) : (
            <>
              {isFrac && (
                <p style={{fontSize:13,color:"#999",textAlign:"center",marginBottom:6}}>
                  仮分数：7/4　帯分数：1と3/4　整数：2<br/>約分してから入力してね
                </p>
              )}
              <input className="answer-in" inputMode={isFrac?"text":"decimal"}
                value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&submitInput()}
                placeholder={isFrac?"例: 3/4":"こたえ"} autoFocus/>
              <div style={{height:10}}/>
              <button className="btn-main" style={{fontSize:18,padding:14}} onClick={submitInput}>こたえる！</button>
            </>
          )}
          <button onClick={reveal}
            style={{marginTop:10,width:"100%",padding:"10px",borderRadius:14,background:"none",
              border:"2px dashed #ffd6c0",color:"#cc8a6a",fontWeight:700,fontSize:14}}>
            こたえをみる
          </button>
        </>
      ) : (
        <div style={{textAlign:"center",padding:"8px 0"}}>
          {state==="revealed"
            ? <div style={{fontSize:16,color:"#cc8a2c",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                こたえ：<AnswerDisplay q={q}/>
              </div>
            : <div style={{fontSize:20,fontWeight:800,color:correct?"#3ba85f":"#cc8a2c"}}>
                {correct?"せいかい！":"おしい！"}
                {!correct && (
                  <div style={{fontSize:15,marginTop:6,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                    こたえ：<AnswerDisplay q={q}/>
                  </div>
                )}
              </div>
          }
        </div>
      )}
    </div>
  );
}

/* ---- 子どもモード：今日の2問 ---- */
function KidQuiz({ pool, student, onRecord }){
  const date = todayStr();
  const { calc, kanji } = useMemo(()=>pickToday(pool, date),[pool, date]);
  const [results, setResults] = useState({});
  const [celebrated, setCelebrated] = useState(false);

  const questions = [calc, kanji].filter(Boolean);
  const doneCount = Object.keys(results).length;
  const allDone = doneCount >= questions.length && questions.length > 0;
  const allCorrect = allDone && Object.values(results).every(r=>r.correct && !r.skipped);

  if(!celebrated && allDone && allCorrect){ setCelebrated(true); }

  const handleFinish=(res)=>{
    setResults(prev=>{
      if(prev[res.questionId]) return prev;
      const next = {...prev, [res.questionId]: res};
      onRecord({ date, studentId:student, questionId:res.questionId, unit:res.unit, mode:res.mode, correct:res.correct });
      return next;
    });
  };

  if(questions.length===0) return <div className="card">プールに もんだいが ありません。先生に つたえてね。</div>;

  return (
    <div>
      {celebrated && <Confetti/>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontSize:13,color:"#aa9"}}>{date}</span>
        <span style={{fontSize:13,fontWeight:700,color:"#cc6a2c"}}>{doneCount}/{questions.length} もん</span>
      </div>
      {calc  && <OneQuestion q={calc}  onFinish={handleFinish} allDone={allDone}/>}
      {kanji && <OneQuestion q={kanji} onFinish={handleFinish} allDone={allDone}/>}
      {allDone && (
        <div className="card pop" style={{textAlign:"center",marginTop:4}}>
          <div style={{fontSize:48}}>{allCorrect?"🎉":"👍"}</div>
          <div style={{fontWeight:800,fontSize:22,color:allCorrect?"#3ba85f":"#cc8a2c"}}>
            {allCorrect?"ぜんもんせいかい！":"よくがんばりました！"}
          </div>
        </div>
      )}
    </div>
  );
}

/* ---- ストリーク（炎）表示 ---- */
function Streak({ records, student }){
  const days = useMemo(()=>{
    const mine = new Set(records.filter(r=>r.studentId===student).map(r=>r.date));
    let count=0; const d=new Date();
    while(true){
      const s=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      if(mine.has(s)){ count++; d.setDate(d.getDate()-1); } else break;
    }
    return count;
  },[records, student]);
  return (
    <div className="card" style={{marginTop:14,textAlign:"center",padding:16}}>
      <span style={{fontSize:22,fontWeight:800,color:"#ff7a3c"}}>
        🔥 {days}日 れんぞく！
      </span>
    </div>
  );
}

  const allCalcUnits = Object.keys(CALC_GEN);

  const toggleCalc=(u)=> setPool(p=>({...p, calcUnits: (p.calcUnits||[]).includes(u)? (p.calcUnits||[]).filter(x=>x!==u):[...(p.calcUnits||[]),u]}));
  const toggleKanji=(u)=> setPool(p=>({...p, kanjiUnits: (p.kanjiUnits||[]).includes(u)? (p.kanjiUnits||[]).filter(x=>x!==u):[...(p.kanjiUnits||[]),u]}));

      </div>
      <p style={{fontSize:12,color:"#bbb",marginBottom:8}}>学年×単元を選択（年度初めは前学年も選べます）</p>

/* ---- 先生：ダッシュボード ---- */
function Dashboard({ records, students }){
  const date = todayStr();
  const today = records.filter(r=>r.date===date);
  const rate = today.length? Math.round(today.filter(r=>r.correct).length/today.length*100):0;

  // つまずき：不正解の多い問題/単元
  const byUnit = {};
  records.forEach(r=>{ byUnit[r.unit]=byUnit[r.unit]||{n:0,wrong:0}; byUnit[r.unit].n++; if(!r.correct)byUnit[r.unit].wrong++; });
  const stumble = Object.entries(byUnit).map(([u,v])=>({u,...v,err:Math.round(v.wrong/v.n*100)}))
    .sort((a,b)=>b.err-a.err);

  const heatColor=(ok)=> ok===null?"#ddd": ok?"#4ec27a":"#e85a5a";

  return (
    <div>
      <div className="card" style={{marginBottom:14,display:"flex",justifyContent:"space-around",textAlign:"center"}}>
        <div><div style={{fontSize:32,fontWeight:800,color:"#ff7a3c"}}>{today.length}</div><div style={{fontSize:12,color:"#999"}}>今日の取組</div></div>
        <div><div style={{fontSize:32,fontWeight:800,color:"#4ec27a"}}>{rate}%</div><div style={{fontSize:12,color:"#999"}}>正答率</div></div>
        <div><div style={{fontSize:32,fontWeight:800,color:"#57b6ff"}}>{students.length}</div><div style={{fontSize:12,color:"#999"}}>在籍</div></div>
      </div>

      <div className="card" style={{marginBottom:14}}>
        <h3 style={{marginBottom:12}}>今日の取り組み状況</h3>
        <table>
          <thead><tr><th>なまえ</th><th>取組</th><th>正誤</th></tr></thead>
          <tbody>
            {students.map(s=>{
              const r=today.find(x=>x.studentId===s);
              return <tr key={s}><td>{s}</td><td>{r?"✅":"—"}</td>
                <td>{r?<span className="heat" style={{background:heatColor(r.correct)}}>{r.correct?"○":"×"}</span>:""}</td></tr>;
            })}
          </tbody>
        </table>
      </div>

      <div className="card">
        <h3 style={{marginBottom:12}}>つまずきやすい単元</h3>
        {stumble.length===0? <p style={{color:"#aaa"}}>まだデータがありません</p> :
          stumble.slice(0,6).map(s=>(
            <div key={s.u} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #f0e8e0"}}>
              <span style={{fontWeight:700}}>{CALC_GEN[s.u]?CALC_GEN[s.u].label:s.u.replace(/^k\d-/,"")}</span>
              <span><span className="heat" style={{background:`hsl(${120-s.err*1.2},70%,55%)`,width:44}}>{s.err}%</span>
                <span style={{fontSize:12,color:"#999",marginLeft:8}}>誤答率</span></span>
            </div>
          ))}
      </div>
    </div>
  );
}

/* ---- パスワード認証画面 ---- */
const MASTER_PIN = "0000"; // ← ダウンロード後にここを自分だけ知る4桁に変える

function AuthGate({ classId, onAuth }){
  const [input, setInput] = useState("");
  const [confirm, setConfirm] = useState("");
  const [error, setError] = useState("");
  const [showPass, setShowPass] = useState(false);
  const [masterMode, setMasterMode] = useState(false); // マスターPINでリセット中

  const hash=(s)=> s.split("").reduce((a,c)=>(a*31+c.charCodeAt(0))>>>0,0).toString(36);

  const { savedHash, setSavedHash } = onAuth;
  const isNew = !savedHash;

  const submit=()=>{
    if(masterMode){
      // マスターPINでパスワードリセット
      if(input !== MASTER_PIN){ setError("マスターPINが違います"); setInput(""); return; }
      setSavedHash("");
      // ▼本番: localStorage.removeItem(`asa_pw_${classId}`);
      setMasterMode(false); setInput(""); setError("");
      return;
    }
    if(isNew){
      if(input.length < 4){ setError("4文字以上で設定してください"); return; }
      if(input !== confirm){ setError("パスワードが一致しません"); return; }
      setSavedHash(hash(input));
      // ▼本番: localStorage.setItem(`asa_pw_${classId}`, hash(input));
      onAuth.onSuccess();
    } else {
      if(hash(input) === savedHash){ onAuth.onSuccess(); }
      else { setError("パスワードが違います"); setInput(""); }
    }
  };

  return (
    <div style={{textAlign:"center",paddingTop:40}}>
      <div style={{fontSize:44}}>{masterMode?"🗝️":"🔐"}</div>
      <h2 style={{fontWeight:800,color:"#cc6a2c",margin:"8px 0 4px"}}>
        {masterMode ? "パスワードのリセット" : "先生モード"}
      </h2>
      <p style={{fontSize:13,color:"#999",marginBottom:24}}>
        {masterMode
          ? "マスターPINを入力するとパスワードをリセットします"
          : isNew ? "初回：パスワードを設定してください" : "パスワードを入力してください"}
      </p>
      <div className="card" style={{textAlign:"left"}}>
        <div style={{position:"relative",marginBottom:12}}>
          <input
            type={showPass?"text":"password"}
            className="answer-in"
            style={{fontSize:22,paddingRight:48}}
            placeholder={masterMode?"マスターPIN":isNew?"新しいパスワード":"パスワード"}
            value={input}
            onChange={e=>{setInput(e.target.value);setError("");}}
            onKeyDown={e=>e.key==="Enter"&&(isNew&&!masterMode?document.getElementById("pw-confirm")?.focus():submit())}
            autoFocus
          />
          <button onClick={()=>setShowPass(v=>!v)}
            style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",
              background:"none",color:"#cc8a6a",fontSize:18,padding:4}}>
            {showPass?"🙈":"👁"}
          </button>
        </div>
        {isNew && !masterMode && (
          <div style={{marginBottom:12}}>
            <input
              id="pw-confirm"
              type={showPass?"text":"password"}
              className="answer-in"
              style={{fontSize:22}}
              placeholder="もう一度入力"
              value={confirm}
              onChange={e=>{setConfirm(e.target.value);setError("");}}
              onKeyDown={e=>e.key==="Enter"&&submit()}
            />
          </div>
        )}
        {error && <p style={{color:"#e85a5a",fontWeight:700,fontSize:14,marginBottom:8,textAlign:"center"}}>{error}</p>}
        {masterMode && !error && (
          <p style={{color:"#cc8a2c",fontSize:13,marginBottom:8,textAlign:"center"}}>
            リセット後、新しいパスワードを設定できます
          </p>
        )}
        <button className="btn-main" style={{fontSize:18}} onClick={submit}>
          {masterMode?"リセットする":isNew?"パスワードを設定する":"入室する"}
        </button>
        {!isNew && !masterMode && (
          <button onClick={()=>{setMasterMode(true);setInput("");setError("");}}
            style={{marginTop:12,width:"100%",padding:"10px",borderRadius:14,background:"none",
              border:"2px dashed #ffd6c0",color:"#cc8a6a",fontWeight:700,fontSize:14}}>
            パスワードを忘れた場合はこちら
          </button>
        )}
        {masterMode && (
          <button onClick={()=>{setMasterMode(false);setInput("");setError("");}}
            style={{marginTop:12,width:"100%",padding:"10px",borderRadius:14,background:"none",
              border:"2px dashed #ffd6c0",color:"#cc8a6a",fontWeight:700,fontSize:14}}>
            キャンセル
          </button>
        )}
      </div>
    </div>
  );
}

/* ---- パスワード変更（先生モード内） ---- */
function ChangePassword({ savedHash, setSavedHash, classId }){
  const hash=(s)=> s.split("").reduce((a,c)=>(a*31+c.charCodeAt(0))>>>0,0).toString(36);
  const [cur, setCur] = useState("");
  const [next1, setNext1] = useState("");
  const [next2, setNext2] = useState("");
  const [msg, setMsg] = useState("");
  const [ok, setOk] = useState(false);

  const submit=()=>{
    if(savedHash && hash(cur)!==savedHash){ setMsg("現在のパスワードが違います"); return; }
    if(next1.length<4){ setMsg("新しいパスワードは4文字以上"); return; }
    if(next1!==next2){ setMsg("新しいパスワードが一致しません"); return; }
    setSavedHash(hash(next1));
    // ▼本番: localStorage.setItem(`asa_pw_${classId}`, hash(next1));
    setOk(true); setMsg(""); setCur(""); setNext1(""); setNext2("");
  };

  return (
    <div className="card">
      <h3 style={{marginBottom:14}}>🔑 パスワード変更</h3>
      {savedHash && (
        <div style={{marginBottom:12}}>
          <p style={{fontSize:13,color:"#999",marginBottom:6}}>現在のパスワード</p>
          <input type="password" className="answer-in" style={{fontSize:20}}
            value={cur} onChange={e=>{setCur(e.target.value);setMsg("");setOk(false);}} placeholder="現在のパスワード"/>
        </div>
      )}
      <div style={{marginBottom:12}}>
        <p style={{fontSize:13,color:"#999",marginBottom:6}}>新しいパスワード（4文字以上）</p>
        <input type="password" className="answer-in" style={{fontSize:20}}
          value={next1} onChange={e=>{setNext1(e.target.value);setMsg("");setOk(false);}} placeholder="新しいパスワード"/>
      </div>
      <div style={{marginBottom:14}}>
        <p style={{fontSize:13,color:"#999",marginBottom:6}}>確認</p>
        <input type="password" className="answer-in" style={{fontSize:20}}
          value={next2} onChange={e=>{setNext2(e.target.value);setMsg("");setOk(false);}} placeholder="もう一度"/>
      </div>
      {msg && <p style={{color:"#e85a5a",fontWeight:700,fontSize:14,marginBottom:8}}>{msg}</p>}
      {ok  && <p style={{color:"#3ba85f",fontWeight:700,fontSize:14,marginBottom:8}}>✅ パスワードを変更しました</p>}
      <button className="btn-main" style={{fontSize:17}} onClick={submit}>変更する</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
